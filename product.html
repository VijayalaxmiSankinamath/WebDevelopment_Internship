<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Product Details</title>
    <link rel="stylesheet" href="product.css">
</head>

<body>

    <div class="container">

        <!-- LEFT: IMAGE -->
        <div class="left">
            <img id="main-img" src="" class="main-img">
            
            <div class="color-options">
                <img class="color-img" src="white.jpg" data-name="White Shirt" data-price="499">
                <img class="color-img" src="black.jpg" data-name="Black Shirt" data-price="599">
                <img class="color-img" src="blue.jpg" data-name="Blue Shirt" data-price="549">
                <img class="color-img" src="pink.jpg" data-name="Pink Shirt" data-price="699">
            </div>
        </div>

        <!-- RIGHT: DETAILS -->
        <div class="right">
            <h1 id="title"></h1>
            <h2 id="price"></h2>

            <p class="desc">
                Premium quality cotton shirt. Comfortable, stylish and perfect for daily wear.
            </p>

            <button class="btn">Add to Cart</button>
        </div>

    </div>

    <script src="product.js"></script>
</body>

</html>
