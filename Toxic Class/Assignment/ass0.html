<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .main{
            width:500px;
            height: 500px;
            background-color:plum;
            display: flex;
            flex-direction: column;
            border: 2px solid black;
            padding: 40px;
            gap: 100px;
        }
        .box{
            width: 100px;
            height: 100px;
            background-color:purple ;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .inner{
            width: 50px;
            height: 50px;
            background-color:darkgrey;
        }
        .row{
            display:flex;
            gap: 100px;
        }
    </style>
</head>
<body>
     <div class="main">
        <div class="row">
            <div class="box"><div class="inner"></div></div>
            <div class="box"><div class="inner"></div></div>
            <div class="box"><div class="inner"></div></div>
        </div>
        <div class="row">
            <div class="box"><div class="inner"></div></div>
            <div class="box" ><div class="inner"></div></div>
            <div class="box"></div>
        </div>
        <div class="row"> 
            <div class="box"></div>
            <div class="box"><div class="inner"></div></div>
            <div class="box"></div>
        </div>
     </div>
</body>
</html>
