<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM IN HTML</title>
</head>
<body><center>
    <h1>LOGIN FORM</h1>

    <form action="" style="width:300px;" autocomplete="off">
        <fieldset>
            <legend>LOGIN FORM</legend>
            <table>
                <tr>
                    <td>
                        <label for="un">Username</label>
                    </td>
                    <td>
                        <input type="text" placeholder="Username" id="un" required>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="pass" >Password</label>
                    </td>
                    <td>
                        <input type="Password" placeholder="Password" id="pass" required>
                    </td>
                </tr>
            </table>
            <footer>
                <button>Login</button>
                <input type="button" value="Cancel" bgcolor="red">
            </footer>
            
        </fieldset>
    </form>
    </center>
    
</body>
</html>
