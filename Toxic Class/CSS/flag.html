<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #flag{
            height: 600px;
            width: 600px;
            background-image: linear-gradient(orange 0%,orange 33.3%,white 33.3%,white 66.6%,green 66.6%,green 100%);
            position: relative;
        }
        #chakra{
            height: 200px;
            width: 200px;
            background-image: repeating-conic-gradient(blue,blue 2%,white 2%,white 4%);
            border-radius: 50%;
            position: absolute;
            left: 200px;
            top: 200px;
        }
    </style>
</head>
<body>
    <div id="flag">
        <div id="chakra">

        </div>
    </div>
    
</body>
</html>
