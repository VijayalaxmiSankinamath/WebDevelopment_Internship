<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: lightgray;
        }

        h1{
            text-align: center;
        }
        h2{
            text-align: center;

        }
        a{
            font-size: 50px;
            position: absolute;
            top: 200px;
            left: 450px;

        }
        a:link{
            color: red;
        }
        a:visited{
            color: green;
        }
        a:hover{
            color: blue;
        }
        a:active{
            color:aqua;
        }
        #fc{
            font-size: 50px;
            position: absolute;
            top: 200px;
            left: 700px;
        }
        #fc:link{
            color:yellow
        }
        #fc:visited{
            color: magenta;
        }
        #fc:hover{
            color: cyan;
        }
        #fc:active{
            color: black;
        }
        button{
            font-size: 50px;
            position: absolute;
            top: 300px;
            left: 570px;
            padding:20px 30px;
           /* transition:background-color 5s, color 0.5s;
            transition-property: background-color, color,border-radius;
            transition-duration: 5s,3s,4s;
            transition-timing-function: linear;
            transition-delay: 5s,0s,0s;

            /* transition: all 5px ; */
            /* transition:background-color 5s linear 0s,color 13s linear 0s,border-radius 4s linear 0s; */
            transition :all 5s linear 0s;
        }

        button:hover{
            background-color: hotpink;
            color: white;
            cursor: pointer;
            border-radius: 100px;
            padding:20px 100px;
        }


    </style>
</head>
<body>
    <h1>CSS Pseudo Classes</h1>
    <hr>
    <h2>Dymanic Pseudo Classes</h2>

    <button>Login</button>
    <br>
    <a href="https://www.google.com">Google</a>
    <a id="fc" href="https://www.facebook.com">Facebook</a>

    
</body>
</html>
