<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Main Container */
.container{
    width:100%;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:20px;
    padding:40px;
}

/* Common Image Box Style */
.box{
    height:300px;
    border:2px solid black;
    background-size:cover;
    background-position:center;
    transition:0.5s ease;
}

/* Hover effect */
/*.box:hover{
    transform:scale(1.05);
}*/

/* Individual Images */
#cls1{ background-image:url(https://tse1.mm.bing.net/th/id/OIP.i54DzKW0j3n8uPCIOfCfDAHaFT?pid=Api&P=0&h=180); }

#cls6{ background-image:url(http://www.hdwallpapers.in/download/tiger_swallowtail_butterfly-1440x900.jpg); }

            }
