<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            background-color: bisque;
        }
        #pa1{
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-items: center;
            align-items: center;
        }
        div{
            height: 300px;
            width: 300px;
            background-color: aqua;
            position: absolute;
            right:45%;
            animation-name: box;
            animation-duration: 10s;
            animation-timing-function: linear;
            animation-delay: 1s;
            animation-iteration-count: 5;


        }
        /* @keyframes box{
            from{
                background-color: aqua;
            }
            to{
                background-color: hotpink;
            }
        } */
         @keyframes box {
            0%{
                background-color: aqua;
                border-radius: 50px;
            }
            25%{
                background-color: indigo;
            }
            50%{
                background-color: hotpink;
                border-radius: 100px;
            }
            75%{
                background-color: yellow;
            }
            100%{
                background-color: green;
                border-radius: 200px;
            }
         }

    </style>
</head>
<body>
    <main id="pa1">
        <div></div>
    </main>
    
</body>
</html>
