<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            background-color:aqua;
            height:500px;
            width: 700px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #div2{
            background-color: yellow;
            height:400px;
            width: 600px;
        }
        #div3{
            background-color: pink;
            height:300px;
            width: 500px;
        }
        section{
            background-color: blueviolet;
            height:200px;
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        article{
            background-color: lightgray;
            height:100px;
            width: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        aside{
            background-color: magenta;
            height:50px;
            width: 200px;
        }
    </style>
</head>
<body>
    <div>
        <div id="div2">
            <div id="div3">
                <section>
                    <article>
                        <aside>

                        </aside>
                    </article>
                </section>
            </div>
        </div>
    </div>
</body>
</html>
