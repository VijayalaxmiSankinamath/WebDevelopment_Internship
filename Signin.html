<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* background-color: aquamarine; */
            background-image: url("https://images.freecreatives.com/wp-content/uploads/2016/05/Pink-Tiles-Gradient-Background.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;

        }

        aside,
        section {
            /* border: 2px solid; */
            height: 280px;
            width: 300px;
        }

        main {
            display: flex;
        }

        #form1 {
            height: 100%;
            width: 100%;
            /* border: 2px solid red; */
        }

        article {
            height: inherit;
            border: 2px solid green;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #f0f1f2, white);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);

        }

        article button {
            width: 70px;
            padding: 10px 0;
            border-radius: 10px;
            background-color: rgb(217, 144, 25);
        }

        article input {
            width: 200px;
            padding: 10px 0;
            border-radius: 2px;
            /* border-radius: 2px solid #ccc; */
            border: 2px solid #ccc;
            padding-left: 10px;
        }

        input:focus {
            border-color: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        #signup:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, orange, orange);
        }

        #loginerr {
            color: red;

        }
    </style>
</head>

<body>

    <main>

        <section class="form-container">
            <form id="form1">
                <!-- <center><h1>Sign-In</h1></center> -->
                <article>
                    <div>
                        <input type="text" placeholder=" Username or email" id="loginUser">
                        <!-- <p id="usererror" class="error"></p> -->
                    </div>

                    <div>
                        <input type="password" placeholder=" password" id="pwdUser" required>
                        <!-- <p id="emailerror" class="error"></p> -->
                    </div>
                    <center>
                        <p id="loginerr"></p>
                        <div>
                            <button id="signup" type="submit">Signup</button>
                        </div>
                    </center>

                </article>


            </form>
        </section>
        <aside>
            <img src="https://images.unsplash.com/photo-1635926891871-d2c4e4518c1f?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                alt="img" height="280px" width="300px">
        </aside>


    </main>
    <script>
        let loginform = document.getElementById("form1");
        let loginerr = document.getElementById("usererror");
        console.log(loginform);

        loginform.addEventListener("submit", (e) => {
            e.preventDefault()
            console.log("login form");

            let loginUser = document.getElementById("loginUser").value;
            let pwdUser = document.getElementById("pwdUser").value;

            let ValidUser = JSON.parse(localStorage.getItem("user")) || [];
            console.log(ValidUser);

            let existUser = ValidUser.find((u) => {
                return (u.username === loginUser || u.email === loginUser) && u.password === pwdUser
            })
            if (existUser) {
                alert("Login successful......");
                setTimeout(() => {
                    window.location.href = "home.html"
                }, 1000)

                return
            }
            else {
                loginerr.innerHTML = "invalid username or password";
            }
        })

    </script>
</body>

</html>
