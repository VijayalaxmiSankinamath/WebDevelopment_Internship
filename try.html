<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    
    /* background-image: url("https://images.pexels.com/photos/531880/pexels-photo-531880.jpeg"); */
    background-image: linear-gradient(lightpink,lightblue);
    background-size: cover;
    background-position: center;
}

/* FORM CONTAINER */
.form-container {
    width: 400px;
    padding: 30px;
    
    /* border-radius: 20px; */
    
    backdrop-filter: blur(12px);
    /* background: rgba(255, 255, 255, 0.15); */
    border: 1px solid rgba(255,255,255,0.3);
    background: linear-gradient(45deg, #f0f1f2, white);
    
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 20px;
    color: #222;
    letter-spacing: 1px;
}

/* INPUT GROUP */
div {
    margin: 15px 0;
}

/* INPUT FIELDS */
input {
    width: 100%;
    padding: 10px;
    
    border-radius: 8px;
    border: 1px solid #ccc;
    
    font-size: 16px;
    outline: none;
    
    transition: 0.3s;
}

/* INPUT FOCUS EFFECT */
 input:focus {
     border-color: #4CAF50; 
     box-shadow: 0 0 8px rgba(76,175,80,0.5); 
 } 

/* ERROR TEXT */
.error {
    color: #ff4d4d;
    font-size: 13px;
    margin-top: 5px;
}

/* BUTTON */
#signup {
    width: 100%;
    padding: 10px;
    
    /* border-radius: 8px; */
    border: none;
    
    background: linear-gradient(45deg, #4CAF50, #2ecc71);
    color: white;
    
    font-size: 16px;
    font-weight: bold;
    
    cursor: pointer;
    transition: 0.3s;
}

/* BUTTON HOVER */
#signup:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #45a049, #27ae60);
}

/* CENTER BUTTON */
center {
    margin-top: 10px;
}
.div1 {
    display: flex;
    justify-content: center;


}
#s1{
     box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.checkbox-container{
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 15px;
    width: 100%;
    padding: 10px;
}

    </style>
</head>
<body>
<div class="div1"><img id="s1" src="https://plus.unsplash.com/premium_photo-1674316194408-979a3a6a907a?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" height="483px" width="400px"></div>

<div class="div1">
    <section class="form-container">
    <form id="myform">
        <center><h1>Sign-up</h1></center>
        <div>
            <input type="text" placeholder="Enter the name" id="username">
            <p id="usererror" class="error"></p>
        </div>
        
        <div>
            <input type="email" placeholder="Enter the email" id="email" required>
            <p id="emailerror" class="error"></p>
        </div>
          <div>
            <input type="password" placeholder="Enter the password" id="pass" 
            pattern="[A-Z]{1}[a-z]{5,8}[!@#$&]{1}[0-9]{3,4}" 
            title="1 uppercase letter 5 to 8 lowercase letters 1 special character 3 to 4 numbers"
            >
                <p id="passerror" class="error"></p>
        </div>
          <div>
            <input type="password" placeholder="Re-Enter the password" id="pass1">
            <p id="conferror" class="error"></p>
        </div>
         <center>
        <div>
            <button id="signup" type="submit">Signup</button>
        </div>
        </center>
       <div class="checkbox-container">
    <!-- <input type="checkbox" id="login"> -->
    <label for="login">
        I already have an account 
        <a href="./Signin.html">Sign in</a>
    </label>
</div>
        
    </form>
</section></div>


<script>
    let myform = document.getElementById("myform");

myform.addEventListener("submit", (e) => {
    e.preventDefault();

    let username = document.getElementById("username").value;
    let password = document.getElementById("pass").value;
    let email = document.getElementById("email").value;
    let confpass = document.getElementById("pass1").value;

    let usererror = document.getElementById("usererror");
    let emailerror = document.getElementById("emailerror");
    let passerror = document.getElementById("passerror");
    let conferror = document.getElementById("conferror");

    usererror.innerHTML = "";
    emailerror.innerHTML = "";
    passerror.innerHTML = "";
    conferror.innerHTML = "";

    let isValid = true;

    if(username === ""){
        usererror.innerHTML = "Please enter the username";
        isValid = false;
    } else if(username.length < 4){
        usererror.innerHTML = "Username must be at least 4 characters long";
        isValid = false;
    }

    if(email === ""){
        emailerror.innerHTML = "Email is required";
        isValid = false;
    }

    if(password === ""){
        passerror.innerHTML = "Password is required";
        isValid = false;
    }

    if(confpass !== password){
        conferror.innerHTML = "Passwords do not match";
        isValid = false;
    }

    if(isValid){
        let arr = JSON.parse(localStorage.getItem("user")) || [];

        let existUser = arr.some((u) => {
            return u.username.toLowerCase() === username.toLowerCase();
        });

        if(existUser){
            alert("User already exists!");
            return;
        }

        let users = { username, email, password };
        arr.push(users);

        localStorage.setItem("user", JSON.stringify(arr));

        alert("Signup successful!");
        myform.reset();
    }
});
</script>

</body>
</html>
